name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Ensure mvnw executable
        run: chmod +x mvnw

      - name: Run tests (all modules)
        run: ./mvnw -ntp -B test

      - name: Package jars (skip tests)
        run: ./mvnw -ntp -B -DskipTests package

      - name: Docker build (all services)
        run: make docker-build TAG=ci

      - name: Docker compose up (all service)
        run:
          make up TAG=ci
        env:
          VISITS_DB_NAME: visits
          VISITS_DB_USER: visits
          VISITS_DB_PASSWORD: visits

      - name: Docker compose verify (all service)
        run:
          make verify

      - name: Logs (on failure)
        if: failure()
        run: TAG=ci docker compose logs --no-color --tail=200

      - name: Down (always)
        if: always()
        run: TAG=ci docker compose down -v
