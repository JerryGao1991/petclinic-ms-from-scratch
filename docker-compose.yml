services:
  config-server:
    image: petclinic/config-server:${TAG:-dev}
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8888/actuator/health/readiness >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  discovery-server:
    image: petclinic/discovery-server:${TAG:-dev}
    depends_on:
      config-server:
        condition: service_healthy
    ports:
      - "8761:8761"
    environment:
      SPRING_CONFIG_IMPORT: "configserver:"
      SPRING_CLOUD_CONFIG_URI: "http://config-server:8888"
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "false"
      EUREKA_CLIENT_FETCH_REGISTRY: "false"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8761/actuator/health/readiness >/dev/null || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 30

  customers-service:
    image: petclinic/customers-service:${TAG:-dev}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SPRING_CONFIG_IMPORT: "configserver:"
      SPRING_CLOUD_CONFIG_URI: "http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://discovery-server:8761/eureka/"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health/readiness >/dev/null || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 30


  vets-service:
    image: petclinic/vets-service:${TAG:-dev}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SPRING_CONFIG_IMPORT: "configserver:"
      SPRING_CLOUD_CONFIG_URI: "http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://discovery-server:8761/eureka/"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health/readiness >/dev/null || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 30

  visits-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: visits
      POSTGRES_USER: visits
      POSTGRES_PASSWORD: visits
    ports:
      - "5432:5432"
    volumes:
      - visits-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U visits -d visits -h localhost" ]
      interval: 5s
      timeout: 3s
      retries: 30


  visits-service:
    image: petclinic/visits-service:${TAG:-dev}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      visits-db:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: "docker"
      SPRING_CONFIG_IMPORT: "configserver:"
      SPRING_CLOUD_CONFIG_URI: "http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://discovery-server:8761/eureka/"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health/readiness >/dev/null || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 30

  api-gateway:
    image: petclinic/api-gateway:${TAG:-dev}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      customers-service:
        condition: service_healthy
      vets-service:
        condition: service_healthy
      visits-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_CONFIG_IMPORT: "configserver:"
      SPRING_CLOUD_CONFIG_URI: "http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://discovery-server:8761/eureka/"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness >/dev/null || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  visits-db-data: